<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBecas - Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="navbar"></div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard</h1>
            <p class="text-gray-500 mt-1">Bienvenido al Sistema de Gestion de Becas Universitarias</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-indigo-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Estudiantes</p>
                        <p id="count-estudiantes" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">🎓</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-green-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Carreras</p>
                        <p id="count-carreras" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">📚</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-yellow-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Becas</p>
                        <p id="count-becas" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">💰</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-red-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Convocatorias</p>
                        <p id="count-convocatorias" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">📋</div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-purple-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Facultades</p>
                        <p id="count-facultades" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">🏛️</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-orange-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Solicitudes</p>
                        <p id="count-solicitudes" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">📝</div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-md p-6 border-l-4 border-teal-500 hover:shadow-lg transition-shadow">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500 uppercase tracking-wide">Asignaciones</p>
                        <p id="count-asignaciones" class="text-3xl font-bold text-gray-800 mt-1">-</p>
                    </div>
                    <div class="text-4xl">✅</div>
                </div>
            </div>
        </div>
    </main>

    <script src="components/navbar.js"></script>
    <script src="js/api.js"></script>
    <script>
        loadNavbar('navbar');

        async function loadCounts() {
            const endpoints = [
                { id: 'count-estudiantes', endpoint: '/estudiantes' },
                { id: 'count-carreras', endpoint: '/carreras' },
                { id: 'count-becas', endpoint: '/becas' },
                { id: 'count-convocatorias', endpoint: '/convocatorias' },
                { id: 'count-facultades', endpoint: '/facultades' },
                { id: 'count-solicitudes', endpoint: '/solicitudes' },
                { id: 'count-asignaciones', endpoint: '/asignaciones' },
            ];

            for (const item of endpoints) {
                try {
                    const response = await api.get(item.endpoint);
                    const data = response.data || [];
                    const count = Array.isArray(data) ? data.length : 0;
                    document.getElementById(item.id).textContent = count;
                } catch (e) {
                    document.getElementById(item.id).textContent = '0';
                }
            }
        }

        loadCounts();
    </script>
</body>
</html>
