<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UniBecas - Solicitudes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="navbar"></div>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold text-gray-800">📝 Solicitudes de Beca</h2>
                <button onclick="openSolicitudModal()" class="bg-green-500 hover:bg-green-600 text-white px-4 py-2 rounded-lg font-medium transition-colors">
                    + Nueva Solicitud
                </button>
            </div>
            <div class="bg-white rounded-xl shadow-md overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full">
                        <thead class="bg-gray-50">
                            <tr>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">ID</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estudiante</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Convocatoria</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Fecha</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Estado</th>
                                <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase">Observaciones</th>
                                <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="solicitudes-table" class="divide-y divide-gray-200"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Nueva Solicitud -->
    <div id="modal-solicitud" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4 max-h-[90vh] overflow-y-auto">
            <div class="px-6 py-4 border-b sticky top-0 bg-white">
                <h3 id="modal-solicitud-title" class="text-lg font-bold text-gray-800">Nueva Solicitud</h3>
            </div>
            <form id="form-solicitud" class="px-6 py-4 space-y-4">
                <input type="hidden" id="solicitud-id">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Estudiante</label>
                    <select id="solicitud-estudiante" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Seleccionar estudiante...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Convocatoria</label>
                    <select id="solicitud-convocatoria" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="">Seleccionar convocatoria...</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Fecha de Solicitud</label>
                    <input type="date" id="solicitud-fecha" required class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Observaciones</label>
                    <textarea id="solicitud-observaciones" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
            </form>
            <div class="px-6 py-4 border-t flex justify-end space-x-3 sticky bottom-0 bg-white">
                <button onclick="closeSolicitudModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">Cancelar</button>
                <button onclick="saveSolicitud()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal Evaluar Solicitud (CU6) -->
    <div id="modal-estado" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-lg mx-4">
            <div class="px-6 py-4 border-b">
                <h3 class="text-lg font-bold text-gray-800">Evaluar Solicitud</h3>
            </div>
            <form id="form-estado" class="px-6 py-4 space-y-4">
                <input type="hidden" id="estado-solicitud-id">
                
                <!-- Info de la solicitud -->
                <div class="bg-gray-50 p-4 rounded-lg">
                    <p class="text-sm text-gray-600"><strong>Estudiante:</strong> <span id="eval-estudiante"></span></p>
                    <p class="text-sm text-gray-600"><strong>Convocatoria:</strong> <span id="eval-convocatoria"></span></p>
                    <p class="text-sm text-gray-600"><strong>Beca:</strong> <span id="eval-beca"></span></p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Decisión</label>
                    <select id="estado-valor" required onchange="toggleAsignacionFields()" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        <option value="PENDIENTE">Mantener Pendiente</option>
                        <option value="APROBADA">✅ Aprobar Solicitud</option>
                        <option value="RECHAZADA">❌ Rechazar Solicitud</option>
                    </select>
                </div>

                <!-- Campos para asignación (solo si se aprueba) -->
                <div id="campos-asignacion" class="hidden space-y-4 border-t pt-4">
                    <p class="text-sm font-medium text-green-700">📋 Datos de la Asignación de Beca:</p>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Inicio Vigencia</label>
                            <input type="date" id="asig-fecha-inicio" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-1">Fecha Fin Vigencia</label>
                            <input type="date" id="asig-fecha-fin" class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                        </div>
                    </div>
                    <p class="text-xs text-gray-500 italic">Se creará automáticamente una asignación de beca con estado activo.</p>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Observaciones</label>
                    <textarea id="estado-observaciones" rows="3" placeholder="Motivo de la decisión..." class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                </div>
            </form>
            <div class="px-6 py-4 border-t flex justify-end space-x-3">
                <button onclick="closeEstadoModal()" class="px-4 py-2 text-gray-600 hover:text-gray-800 font-medium">Cancelar</button>
                <button onclick="saveEstado()" class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg font-medium transition-colors">Confirmar Decisión</button>
            </div>
        </div>
    </div>

    <script src="../components/navbar.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/solicitudes.js"></script>
</body>
</html>
